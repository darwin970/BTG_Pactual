name: CI/CD → AWS Elastic Beanstalk

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Configurar Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle 7.6.4 ──────────────────────────────────────────────────────
      - name: Configurar Gradle 7.6.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6.4'
          validate-wrappers: false

      # ── 4. Compilar fat JAR ───────────────────────────────────────────────────
      - name: Build bootJar
        working-directory: microservicio
        run: gradle bootJar --no-daemon

      # ── 5. Empaquetar JAR + Procfile en ZIP para Elastic Beanstalk ───────────
      - name: Crear paquete de despliegue (deploy.zip)
        working-directory: microservicio
        run: |
          cp Procfile build/libs/
          cd build/libs
          zip deploy.zip btg-0.0.1-SNAPSHOT.jar Procfile

      # ── 6. Credenciales AWS ───────────────────────────────────────────────────
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ── 7. Deploy a Elastic Beanstalk ─────────────────────────────────────────
      - name: Deploy a Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: btg-pactual
          environment_name: btg-pactual-env
          version_label: "v${{ github.run_number }}-${{ github.run_attempt }}-${{ github.sha }}"
          region: us-east-1
          deployment_package: microservicio/build/libs/deploy.zip
