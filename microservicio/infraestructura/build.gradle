apply plugin: 'java'
apply plugin: 'jacoco'

group = 'com.btg'
version = '0.0.1-SNAPSHOT'
sourceCompatibility = '17'

repositories {
	mavenCentral()
}

dependencies {

	implementation project(':dominio')
	implementation project(':aplicacion')

	implementation project(':comun:comun-dominio')
	implementation project(':comun:comun-infraestructura')
	implementation project(':comun:comun-aplicacion-comando')

	implementation project.ext.springtxt
	implementation project.ext.springbootweb

	implementation platform('software.amazon.awssdk:bom:2.25.70')
	implementation 'software.amazon.awssdk:dynamodb-enhanced'
	implementation 'software.amazon.awssdk:dynamodb'

	implementation 'org.springframework.boot:spring-boot-starter-security:2.7.18'

	implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

	compileOnly project.ext.lombok
	annotationProcessor project.ext.lombok

	testImplementation project.ext.springboottest
	testImplementation project.ext.mockito
	testImplementation project.ext.junit
	testImplementation project(':comun:comun-test')
}

jacocoTestReport {
	reports {
		xml.required = true
		html.required = true
	}
	additionalSourceDirs files("../aplicacion/src/main/java")
	additionalClassDirs files("../aplicacion/build/classes/java/main")
}

test {
	finalizedBy jacocoTestReport
}
